<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risk Arbitrage — Live Pipeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0f12; --panel:#15181d; --panel2:#1a1e24; --border:#262b33;
    --txt:#d8dce2; --muted:#7a828e; --amber:#f0a830; --amber-dim:rgba(240,168,48,.14);
    --green:#4caf7d; --red:#e05c5c; --blue:#5b8dd6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:'IBM Plex Sans',sans-serif;font-size:13px;padding:28px 32px 60px}
  .mono{font-family:'IBM Plex Mono',monospace}

  header{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--border);padding-bottom:14px;margin-bottom:18px;gap:12px;flex-wrap:wrap}
  h1{font-size:17px;font-weight:600;letter-spacing:.4px}
  h1 span{color:var(--amber)}
  .sub-h{color:var(--muted);font-size:12px}
  a.lnk{color:var(--blue);text-decoration:none;font-size:12px}
  a.lnk:hover{color:var(--amber)}
  .badge{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);border:1px solid var(--border);border-radius:9px;padding:1px 7px}
  .badge.live{color:var(--green);border-color:var(--green)}
  .badge.err{color:var(--red);border-color:var(--red)}

  .strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:18px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:12px 14px}
  .card .lbl{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
  .card .val{font-family:'IBM Plex Mono',monospace;font-size:19px;color:var(--amber)}
  .card .sub{color:var(--muted);font-size:11px;margin-top:3px}

  .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
  select{background:var(--panel2);color:var(--txt);border:1px solid var(--border);border-radius:5px;padding:6px 11px;font-family:'IBM Plex Sans',sans-serif;font-size:12px;cursor:pointer}
  select:hover{border-color:var(--amber)}
  .search{background:var(--panel2);border:1px solid var(--border);border-radius:5px;color:var(--txt);font-size:12px;padding:6px 10px;width:240px}
  .search:focus{border-color:var(--amber);outline:none}
  .search::placeholder{color:#4a515c}
  .toolbar .spacer{flex:1}

  .tblwrap{overflow-x:auto;border:1px solid var(--border);border-radius:6px;background:var(--panel);-webkit-overflow-scrolling:touch}
  table{width:100%;border-collapse:collapse;min-width:960px}
  th{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);text-align:left;padding:9px 10px;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--panel2);cursor:pointer;user-select:none}
  th:hover{color:var(--amber)}
  th .arrow{color:var(--amber);font-size:9px;margin-left:3px}
  td{padding:8px 10px;border-bottom:1px solid #1e232b;vertical-align:middle;white-space:nowrap}
  tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:#191d23}
  td.num,th.num{font-family:'IBM Plex Mono',monospace;text-align:right}
  td.tgt{font-weight:600}
  td.wide{white-space:normal;min-width:240px;color:var(--muted)}
  th:nth-child(1),td:nth-child(1){position:sticky;left:0;z-index:2;background:var(--panel)}
  thead th:nth-child(1){background:var(--panel2);z-index:3}
  tbody tr:hover td:nth-child(1){background:#191d23}
  .pos{color:var(--green)} .neg{color:var(--red)} .amb{color:var(--amber)} .mut{color:var(--muted)}
  .st{display:inline-block;font-size:11px;border:1px solid var(--border);border-radius:9px;padding:1px 8px;color:var(--muted)}

  .msg{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:22px 24px;line-height:1.7;color:var(--muted)}
  .msg h2{color:var(--txt);font-size:14px;margin-bottom:10px}
  .msg b{color:#9aa2ae}
  .msg code{font-family:'IBM Plex Mono',monospace;color:var(--amber);background:var(--panel2);padding:1px 5px;border-radius:3px}
  .msg ol{margin:8px 0 8px 20px} .msg li{margin-bottom:5px}

  footer{margin-top:22px;color:var(--muted);font-size:11px;line-height:1.6;border-top:1px solid var(--border);padding-top:14px}
  @media(max-width:700px){body{padding:12px}.strip{grid-template-columns:repeat(2,1fr)}.search{width:100%}}
</style>
</head>
<body>

<header>
  <div>
    <h1>RISK ARBITRAGE <span>// LIVE PIPELINE</span></h1>
    <div class="sub-h">Situations spéciales · <span class="mono">données en direct</span> — <span id="updated">chargement…</span></div>
  </div>
  <div style="display:flex;gap:12px;align-items:baseline">
    <a class="lnk" href="./market-review.html">← M&A Review</a>
    <span id="status" class="badge">…</span>
  </div>
</header>

<div id="content"></div>

<footer id="foot"></footer>

<!-- ================================================================= -->
<!--  CONFIG — colle l'ID de ta Google Sheet publiée (lecture seule).   -->
<!--  L'ID est la partie entre /d/ et /edit de l'URL de la Sheet :      -->
<!--  https://docs.google.com/spreadsheets/d/<ICI>/edit                 -->
<!--  La Sheet doit être partagée « Tous les utilisateurs disposant     -->
<!--  du lien : Lecteur ». Voir PIPELINE_SETUP.md pour le pas-à-pas et  -->
<!--  le schéma de colonnes attendu.                                    -->
<!--  Override possible sans toucher au code : ?sheet=<ID> ou ?csv=<url>-->
<!-- ================================================================= -->
<script>
const SHEET_ID  = "PASTE_YOUR_SHEET_ID_HERE";
const SHEET_TAB = "Pipeline"; // nom de l'onglet dans la Sheet

/* ---- résolution de la source CSV (constante ou override par URL) ---- */
const qs = new URLSearchParams(location.search);
function csvUrl(){
  if(qs.get("csv")) return qs.get("csv"); // test / avancé : URL CSV directe
  const id = qs.get("sheet") || SHEET_ID;
  if(!id || id==="PASTE_YOUR_SHEET_ID_HERE") return null;
  return `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_TAB)}`;
}

/* ---- colonnes reconnues (en-têtes tolérants, insensibles à la casse) ---- */
const COLS = [
  {keys:["target","cible"],                                   label:"Cible",        kind:"tgt"},
  {keys:["acquirer","acquéreur","acquereur","bidder"],        label:"Acquéreur"},
  {keys:["sector","secteur","gics"],                          label:"Secteur",      filter:true},
  {keys:["region","région","geography","géographie"],         label:"Région",       filter:true},
  {keys:["status","statut","stage"],                          label:"Statut",       kind:"status", filter:true},
  {keys:["announced","annoncé","annonce","announced date","date annonce"], label:"Annoncé", kind:"date"},
  {keys:["expected close","close","closing","closing est","closing estimé","échéance"], label:"Closing est.", kind:"date"},
  {keys:["consideration","contrepartie","offer type","type"], label:"Contrepartie"},
  {keys:["deal value","value","taille","size","deal value ($bn)","taille $bn"], label:"Taille $bn", kind:"num"},
  {keys:["gross spread","gross","spread brut","gross spread (%)"],           label:"Spread brut", kind:"pct"},
  {keys:["ann spread","annualised spread","annualized spread","ann. spread","spread ann","ann spread (%)"], label:"Spread ann.", kind:"pct"},
  {keys:["note","notes","commentaire","comment","thesis","thèse"],           label:"Note", kind:"wide"}
];

/* ---- utilitaires ---- */
const $ = id => document.getElementById(id);
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const norm = s => String(s||"").trim().toLowerCase().replace(/\./g,"").replace(/\s+/g," ");
const parseNum = s => { if(s==null) return null; const v=parseFloat(String(s).replace(/[%,\s]/g,m=>m===","?".":"")); return isNaN(v)?null:v; };
const fmt = (n,d=1)=> n==null?"—":n.toLocaleString("fr-FR",{minimumFractionDigits:d,maximumFractionDigits:d});
const median = a => { if(!a.length) return null; const s=[...a].sort((x,y)=>x-y),m=Math.floor(s.length/2); return s.length%2?s[m]:(s[m-1]+s[m])/2; };

/* ---- parseur CSV (gère guillemets, virgules et retours à la ligne) ---- */
function parseCSV(text){
  const rows=[]; let row=[], cur="", q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; }
      else cur+=c;
    }else{
      if(c==='"') q=true;
      else if(c===",") { row.push(cur); cur=""; }
      else if(c==="\n"){ row.push(cur); rows.push(row); row=[]; cur=""; }
      else if(c==="\r"){ /* ignore */ }
      else cur+=c;
    }
  }
  if(cur!==""||row.length){ row.push(cur); rows.push(row); }
  return rows.filter(r=>r.some(v=>String(v).trim()!==""));
}

let DATA=[], sortKey=null, sortDir=1;

/* ---- mapping en-têtes -> colonnes ---- */
function mapHeaders(header){
  const H=header.map(norm);
  return COLS.map(col=>{
    let idx=-1;
    for(const k of col.keys){ const p=H.indexOf(norm(k)); if(p>=0){idx=p;break;} }
    return {...col, idx};
  });
}

function load(){
  const url=csvUrl();
  if(!url){ renderSetup(); $("status").textContent="non configuré"; $("status").className="badge err"; $("updated").textContent="—"; return; }
  $("status").textContent="chargement…";
  fetch(url,{cache:"no-store"})
    .then(r=>{ if(!r.ok) throw new Error("HTTP "+r.status); return r.text(); })
    .then(text=>{
      const rows=parseCSV(text);
      if(!rows.length) throw new Error("Sheet vide");
      const cols=mapHeaders(rows[0]);
      if(!cols.some(c=>c.idx>=0)) throw new Error("En-têtes non reconnus (vérifie la 1ère ligne)");
      DATA=rows.slice(1).map(r=>{
        const o={};
        cols.forEach(c=>{ o[c.label]= c.idx>=0 ? (r[c.idx]||"").trim() : ""; });
        return o;
      }).filter(o=>Object.values(o).some(v=>v!==""));
      $("status").textContent="● live"; $("status").className="badge live";
      const now=new Date();
      $("updated").textContent="chargé à "+now.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
      buildUI(cols);
    })
    .catch(err=>{ renderError(err.message); $("status").textContent="erreur"; $("status").className="badge err"; $("updated").textContent="—"; });
}

function activeCols(cols){ return cols.filter(c=>c.idx>=0); }

function buildUI(cols){
  const shown=activeCols(cols);
  // barre de filtres
  const filterCols=shown.filter(c=>c.filter);
  const selects=filterCols.map(c=>{
    const vals=[...new Set(DATA.map(d=>d[c.label]).filter(Boolean))].sort();
    return `<select data-fil="${esc(c.label)}"><option value="">${esc(c.label)} : tous</option>${vals.map(v=>`<option>${esc(v)}</option>`).join("")}</select>`;
  }).join("");
  $("content").innerHTML=`
    <div class="strip" id="cards"></div>
    <div class="toolbar">
      <input class="search" id="q" placeholder="🔍 rechercher…">
      ${selects}
      <div class="spacer"></div>
    </div>
    <div class="tblwrap"><table><thead><tr>${
      shown.map(c=>`<th data-k="${esc(c.label)}" class="${c.kind==='num'||c.kind==='pct'?'num':''}">${esc(c.label)}</th>`).join("")
    }</tr></thead><tbody id="tbody"></tbody></table></div>`;
  $("q").addEventListener("input",()=>render(shown));
  document.querySelectorAll("[data-fil]").forEach(s=>s.addEventListener("change",()=>render(shown)));
  document.querySelectorAll("th[data-k]").forEach(th=>th.addEventListener("click",()=>{
    const k=th.dataset.k; if(sortKey===k) sortDir*=-1; else {sortKey=k;sortDir=1;}
    render(shown);
  }));
  render(shown);
}

function visibleRows(shown){
  const term=norm($("q").value);
  const fils=[...document.querySelectorAll("[data-fil]")].map(s=>({k:s.dataset.fil,v:s.value})).filter(f=>f.v);
  return DATA.filter(d=>{
    if(fils.some(f=>d[f.k]!==f.v)) return false;
    if(term && !shown.some(c=>norm(d[c.label]).includes(term))) return false;
    return true;
  });
}

function render(shown){
  let rows=visibleRows(shown);
  if(sortKey){
    const col=shown.find(c=>c.label===sortKey), numeric=col&&(col.kind==="num"||col.kind==="pct");
    rows=[...rows].sort((a,b)=>{
      let x=a[sortKey],y=b[sortKey];
      if(numeric){ x=parseNum(x); y=parseNum(y); }
      if(x==null||x==="") return 1; if(y==null||y==="") return -1;
      return (x<y?-1:x>y?1:0)*sortDir;
    });
  }
  $("tbody").innerHTML=rows.map(d=>`<tr>${shown.map(c=>cell(d,c)).join("")}</tr>`).join("")
    || `<tr><td colspan="${shown.length}" class="mut" style="padding:16px">Aucune ligne.</td></tr>`;
  // en-têtes : flèche de tri
  document.querySelectorAll("th[data-k]").forEach(th=>{
    th.innerHTML=th.textContent.replace(/[▲▼]/g,"").trim()+(th.dataset.k===sortKey?`<span class="arrow">${sortDir>0?"▲":"▼"}</span>`:"");
  });
  renderCards(rows,shown);
}

function cell(d,c){
  const v=d[c.label];
  if(c.kind==="num"){ const n=parseNum(v); return `<td class="num">${n==null?"—":fmt(n,1)}</td>`; }
  if(c.kind==="pct"){ const n=parseNum(v); return `<td class="num ${n<0?'neg':'amb'}">${n==null?"—":fmt(n,1)+"%"}</td>`; }
  if(c.kind==="status") return `<td>${v?`<span class="st">${esc(v)}</span>`:""}</td>`;
  if(c.kind==="tgt")    return `<td class="tgt">${esc(v)}</td>`;
  if(c.kind==="wide")   return `<td class="wide">${esc(v)}</td>`;
  return `<td>${esc(v)}</td>`;
}

function renderCards(rows,shown){
  const has=lbl=>shown.some(c=>c.label===lbl);
  const cards=[];
  cards.push(card("Deals",rows.length,"situations affichées"));
  if(has("Taille $bn")){ const flow=rows.reduce((t,d)=>t+(parseNum(d["Taille $bn"])||0),0); cards.push(card("Dealflow","$"+fmt(flow,1)+"bn","Σ tailles renseignées")); }
  if(has("Spread brut")){ const m=median(rows.map(d=>parseNum(d["Spread brut"])).filter(v=>v!=null)); cards.push(card("Spread brut méd.",m==null?"—":fmt(m,1)+"%","médiane affichée")); }
  if(has("Spread ann.")){ const m=median(rows.map(d=>parseNum(d["Spread ann."])).filter(v=>v!=null)); cards.push(card("Spread ann. méd.",m==null?"—":fmt(m,1)+"%","base 365j")); }
  $("cards").innerHTML=cards.join("");
}
const card=(lbl,val,sub)=>`<div class="card"><div class="lbl">${esc(lbl)}</div><div class="val">${esc(val)}</div><div class="sub">${esc(sub)}</div></div>`;

function renderSetup(){
  $("content").innerHTML=`<div class="msg">
    <h2>⚙ Pipeline non encore connecté</h2>
    Cette page affiche en direct une <b>Google Sheet publiée en lecture seule</b>. Pour la brancher :
    <ol>
      <li>Ouvre <code>pipeline.html</code> et remplace <code>PASTE_YOUR_SHEET_ID_HERE</code> par l'ID de ta Sheet (la partie entre <code>/d/</code> et <code>/edit</code> de son URL).</li>
      <li>Dans la Sheet : <b>Partager → Tous les utilisateurs disposant du lien : Lecteur</b>, et nomme l'onglet <code>Pipeline</code>.</li>
      <li>Mets une ligne d'en-têtes (Cible, Acquéreur, Secteur, Statut, Annoncé, Closing, Contrepartie, Taille $bn, Spread brut, Spread ann., Note) puis une ligne par deal.</li>
    </ol>
    Détail complet et schéma : <code>PIPELINE_SETUP.md</code>. Test rapide sans éditer le code : ajoute <code>?sheet=&lt;ID&gt;</code> à l'URL.
  </div>`;
}
function renderError(m){
  $("content").innerHTML=`<div class="msg">
    <h2 class="mut" style="color:var(--red)">Impossible de charger le pipeline</h2>
    Erreur : <b>${esc(m)}</b><br><br>
    Vérifie que la Sheet est partagée « <b>Tous les utilisateurs disposant du lien : Lecteur</b> », que l'ID est correct et que l'onglet s'appelle <code>${esc(SHEET_TAB)}</code>.
  </div>`;
}

$("foot").innerHTML=`Pipeline indicatif de situations spéciales / risk arbitrage — à titre d'information, non contractuel, ne constitue ni un conseil ni une offre. Spreads et échéances indicatifs, susceptibles d'évoluer. Données mises à jour en continu depuis la source.`;

load();
</script>
</body>
</html>
